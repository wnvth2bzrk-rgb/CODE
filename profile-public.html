<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="manifest" href="/manifest.json">
    <link rel="canonical" href="https://needs-ae86d.web.app/profile-public.html">
<meta name="description" content="Profil prestataire Needs — services, avis et réservation à Montréal et au Québec.">
<title>Profil — Needs</title>
<script src="prefs.js"></script>
  <script src="js/theme-init.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/needs-analytics.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme-needs.css">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="cursor.css">
<style>
html.needs-light body{background:var(--bg);color:var(--text);}
html.needs-light .header{background:rgba(255,255,255,.95);border-color:var(--border);}
html.needs-light .logo{color:var(--text);}
html.needs-light .hbtn{color:var(--text);background:rgba(15,23,42,.06);border-color:rgba(15,23,42,.15);}
html.needs-light .hbtn:hover{border-color:var(--blue);}
html.needs-light .hbtn.pri{background:var(--blue);color:#fff;}
html.needs-light .back{color:var(--blue);}
html.needs-light .hname,.html.needs-light .mchip strong,.html.needs-light .ival,.html.needs-light .sti strong{color:var(--text);}
html.needs-light .hbio,.html.needs-light .mchip,.html.needs-light .ilbl,.html.needs-light .sti span{color:var(--muted);}
html.needs-light .aside{background:var(--card);border-color:var(--border);}
html.needs-light .aside h3{color:var(--text);}
html.needs-light .sc{background:var(--card);border-color:var(--border);}
html.needs-light .sbody h3,.html.needs-light .sprice{color:var(--text);}
html.needs-light .sbody p,.html.needs-light .rtext,.html.needs-light .rdate{color:var(--muted);}
html.needs-light .rname,.html.needs-light .empty{color:var(--muted);}
html.needs-light .tbb{color:var(--muted);}
html.needs-light .tbb:hover,.html.needs-light .tbb.act{color:var(--blue);}
html.needs-light footer{border-color:var(--border);color:var(--muted);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
#loader{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
.lbrand{font-size:2rem;font-weight:800;background:linear-gradient(135deg,#2563EB,#8B5CF6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 6%;border-bottom:1px solid var(--border);background:rgba(7,11,20,.96);backdrop-filter:blur(14px);position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text);font-weight:800;font-size:1.2rem;}
.logo-ico{width:38px;height:38px;background:var(--blue);border-radius:11px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;}
.hbtn{padding:9px 16px;border-radius:10px;font-weight:700;font-size:.82rem;text-decoration:none;border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--text);cursor:pointer;transition:all .2s;font-family:inherit;display:inline-flex;align-items:center;gap:7px;}
.hbtn:hover{border-color:var(--blue);}
.hbtn.pri{background:var(--blue);border-color:var(--blue);color:#fff;}
@media(max-width:640px){
  header .header nav{flex-wrap:wrap;justify-content:flex-end;}
  header .header .hbtn span:not(.txt-reserve):not(.txt-msg):not(.txt-mydash){display:none;}
}
.wrap{max-width:1020px;margin:0 auto;padding:32px 20px 60px;}
.back{display:inline-flex;align-items:center;gap:8px;color:var(--blue);font-weight:700;text-decoration:none;margin-bottom:24px;font-size:.86rem;}
.back:hover{text-decoration:underline;}
.hero{display:flex;gap:24px;margin-bottom:32px;flex-wrap:wrap;align-items:flex-start;}
.pframe{display:inline-block;padding:10px;background:linear-gradient(145deg,var(--card),#1e293b);border:2px solid var(--border);border-radius:20px;box-shadow:0 14px 40px rgba(0,0,0,.4);flex-shrink:0;}
.pframe img{width:130px;height:130px;border-radius:14px;object-fit:cover;background:#1e293b;display:block;}
.hinfo{flex:1;min-width:220px;}
.hname{font-size:1.8rem;font-weight:800;letter-spacing:-.4px;margin-bottom:8px;}
.spill{display:inline-flex;align-items:center;gap:7px;padding:6px 14px;border-radius:999px;font-size:.75rem;font-weight:800;margin-bottom:12px;}
.son{background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.35);}
.soff{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.35);}
.hbio{color:var(--muted);font-size:.88rem;line-height:1.6;margin-bottom:14px;max-width:520px;}
.hmeta{display:flex;flex-wrap:wrap;gap:14px;}
.mchip{display:flex;align-items:center;gap:7px;font-size:.79rem;color:var(--muted);}
.mchip i{color:var(--blue);}
.mchip strong{color:var(--text);}
.hstats{display:flex;gap:28px;flex-wrap:wrap;align-self:center;}
.sti{text-align:center;}
.sti strong{display:block;font-size:1.75rem;font-weight:800;}
.sti span{font-size:.72rem;color:var(--muted);}
.gbar{display:flex;align-items:center;justify-content:center;gap:12px;padding:12px 20px;background:rgba(37,99,235,.07);border:1px solid rgba(37,99,235,.18);border-radius:14px;margin-bottom:28px;}
.gbar i{color:var(--blue);}
.gbar span{font-size:.84rem;font-weight:700;}
.g2{display:grid;grid-template-columns:270px 1fr;gap:22px;align-items:start;}
@media(max-width:740px){.g2{grid-template-columns:1fr;}.hero{flex-direction:column;}.hstats{margin-top:8px;}}
.aside{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px;position:sticky;top:82px;}
.aside h3{font-size:.88rem;font-weight:800;margin-bottom:14px;}
.irow{display:flex;align-items:center;gap:11px;margin-bottom:13px;}
.iico{width:38px;height:38px;background:rgba(37,99,235,.1);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--blue);flex-shrink:0;}
.ilbl{font-size:.68rem;color:var(--muted);display:block;margin-bottom:2px;}
.ival{font-weight:700;font-size:.88rem;}
.ctamsg{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:12px;margin-top:16px;background:var(--blue);color:#fff;border-radius:12px;font-weight:800;text-decoration:none;font-size:.86rem;transition:background .2s;}
.ctamsg:hover{background:#1d4ed8;}
.tabs{display:flex;gap:20px;border-bottom:2px solid var(--border);margin-bottom:20px;}
.tbb{background:none;border:none;color:var(--muted);padding:9px 0;font-weight:700;font-size:.86rem;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:inherit;}
.tbb:hover{color:var(--text);}
.tbb.act{color:var(--blue);border-bottom-color:var(--blue);}
.sc{background:var(--card);border:1px solid var(--border);border-radius:15px;overflow:hidden;display:flex;margin-bottom:14px;transition:border-color .2s,box-shadow .2s;}
.sc:hover{border-color:rgba(37,99,235,.35);box-shadow:0 8px 24px rgba(0,0,0,.15);}
.sc img{width:180px;min-height:140px;object-fit:cover;background:#1e293b;flex-shrink:0;}
@media(max-width:560px){.sc{flex-direction:column;}.sc img{width:100%;min-height:170px;}}
.sbody{padding:18px;flex:1;}
.sbody h3{font-size:1rem;margin-bottom:6px;}
.sbody p{color:var(--muted);font-size:.83rem;line-height:1.5;margin-bottom:10px;}
.sprice{font-size:1.2rem;font-weight:800;color:var(--green);margin-bottom:10px;}
.sprice small{font-size:.7rem;color:var(--muted);font-weight:600;}
.btnbook{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;background:var(--blue);color:#fff;border-radius:9px;font-weight:800;font-size:.8rem;text-decoration:none;transition:background .2s;}
.btnbook:hover{background:#1d4ed8;}
.rc{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:16px;margin-bottom:12px;}
.rstars{color:var(--gold);margin-bottom:6px;font-size:.88rem;}
.rname{font-weight:800;font-size:.86rem;}
.rtext{color:var(--muted);font-size:.83rem;margin-top:6px;line-height:1.5;}
.rdate{font-size:.68rem;color:var(--muted);margin-top:5px;}
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty i{font-size:2.2rem;margin-bottom:12px;opacity:.35;display:block;}
.empty p{font-size:.85rem;}
footer{text-align:center;padding:24px 20px;border-top:1px solid var(--border);margin-top:40px;color:var(--muted);font-size:.8rem;}
footer a{color:var(--blue);text-decoration:none;}

/* Forçage demandé : ces textes restent noirs (jour/nuit) */
.hname,
#status,
#status i,
#bio,
#city,
#meta .mchip,
#meta .mchip strong,
#cntSrv,
#cntRat,
#cntRev,
.sti span,
.gbar span,
.tabs .tbb,
.tabs .tbb:hover,
.tabs .tbb.act {
  color:#0A0A0F !important;
}
</style>
</head>
<body>

<div id="loader">
  <div class="lbrand">needs</div>
  <i class="fa-solid fa-circle-notch fa-spin" style="color:#2563EB;font-size:1.1rem;"></i>
</div>

<header class="header">
  <a href="index.html" class="logo"><div class="logo-ico">N</div><span>NEEDS</span></a>
  <nav style="display:flex;align-items:center;gap:10px;">
    <a href="services.html" class="hbtn pri"><i class="fa-solid fa-th-large"></i> <span id="navServices">Services</span></a>
    <a href="favoris.html" class="hbtn"><i class="fa-solid fa-heart"></i> <span id="navFavs">Favoris</span></a>
    <a href="compte.html" class="hbtn"><i class="fa-regular fa-user"></i> <span id="navAccount">Mon Compte</span></a>
    <button type="button" class="hbtn" id="themeBtn" onclick="toggleTheme()" aria-label="Changer le thème" style="padding:9px 14px;"><i class="fa-solid fa-moon" id="themeIcon"></i></button>
  </nav>
</header>

<div class="wrap">
  <a href="services.html" class="back"><i class="fa-solid fa-arrow-left"></i> Retour aux services</a>

  <section class="hero">
    <div class="pframe">
      <img id="pic" src="" alt="Photo de profil">
    </div>
    <div class="hinfo">
      <h1 class="hname" id="name">Chargement…</h1>
      <div id="status" class="spill son" style="display:none;"></div>
      <p id="bio" class="hbio" style="display:none;"></p>
      <div class="hmeta" id="meta"></div>
    </div>
    <div class="hstats">
      <div class="sti"><strong id="cntSrv">—</strong><span>Services</span></div>
      <div class="sti"><strong id="cntRat">—</strong><span>Note</span></div>
      <div class="sti"><strong id="cntRev">—</strong><span>Avis</span></div>
    </div>
  </section>

  <div class="gbar">
    <i class="fa-solid fa-shield-halved"></i>
    <span>Paiement sécurisé Needs — Vous ne payez que si vous êtes satisfait.</span>
  </div>

  <div class="g2">
    <aside>
      <div class="aside">
        <h3>À propos</h3>
        <div class="irow">
          <div class="iico"><i class="fa-solid fa-location-dot"></i></div>
          <div><span class="ilbl">Localisation</span><span class="ival" id="city">—</span></div>
        </div>
        <div class="irow">
          <div class="iico"><i class="fa-solid fa-shield-check"></i></div>
          <div><span class="ilbl">Vérification</span><span class="ival" id="verif">—</span></div>
        </div>
        <div class="irow" id="ratingRow" style="display:none;">
          <div class="iico"><i class="fa-solid fa-star"></i></div>
          <div><span class="ilbl">Note moyenne</span><span class="ival" id="ratingAside">—</span></div>
        </div>
        <a href="#" id="msgBtn" class="ctamsg"><i class="fa-solid fa-paper-plane"></i> Envoyer un message</a>
      </div>
    </aside>

    <main>
      <div class="tabs">
        <button class="tbb act" data-tab="srv">Services</button>
        <button class="tbb" data-tab="rev">Avis clients</button>
      </div>
      <div id="srvZone"><div class="empty"><i class="fa-solid fa-circle-notch fa-spin"></i><p>Chargement des services…</p></div></div>
      <div id="revZone" style="display:none;"><div class="empty"><i class="fa-solid fa-circle-notch fa-spin"></i><p>Chargement des avis…</p></div></div>
    </main>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="js/nav-provider-cta.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script>
var fbCfg = {
  apiKey: "AIzaSyAQQSVZx38jeI-8-OL-sfaDSxElqrOTJOU",
  authDomain: "needs-ae86d.firebaseapp.com",
  projectId: "needs-ae86d",
  storageBucket: "needs-ae86d.firebasestorage.app",
  messagingSenderId: "253900994407",
  appId: "1:253900994407:web:55168e1b73c878761de1c2"
};
if (!firebase.apps.length) firebase.initializeApp(fbCfg);
var db = firebase.firestore();
var auth = firebase.auth();

function $id(id) { return document.getElementById(id); }
function setText(id, val) { var e = $id(id); if (e) e.textContent = val; }
function hideLoader() { $id('loader').style.display = 'none'; }

var sellerId = new URLSearchParams(window.location.search).get('id');

if (!sellerId) {
  setText('name', 'URL invalide — paramètre ?id= manquant');
  hideLoader();
} else {

  db.collection('users').doc(sellerId).onSnapshot(
    function(doc) {
      if (!doc.exists) {
        setText('name', 'Profil introuvable');
        hideLoader();
        return;
      }
      var d = doc.data();

      var name = d.username || d.displayName || d.name || 'Expert';
      setText('name', name);
      document.title = name + ' — Needs';

      var fallback = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) + '&background=2563EB&color=fff&size=260';
      var pic = (d.photoURL && d.photoURL.trim() !== '') ? d.photoURL : fallback;
      var img = $id('pic');
      img.src = pic;
      img.onerror = function() { this.src = fallback; this.onerror = null; };

      var avail = d.isAvailable !== false;
      var sb = $id('status');
      sb.style.display = 'inline-flex';
      sb.className = 'spill ' + (avail ? 'son' : 'soff');
      sb.innerHTML = avail
        ? '<i class="fa-solid fa-circle" style="font-size:.45rem;"></i> Disponible'
        : '<i class="fa-solid fa-clock"></i> Occupé';

      var bioEl = $id('bio');
      if (d.bio && d.bio.trim().length > 0) {
        bioEl.textContent = d.bio.trim();
        bioEl.style.display = 'block';
      } else {
        bioEl.style.display = 'none';
      }

      setText('verif', d.isVerified ? '✓ Profil vérifié' : 'Non vérifié');

      hideLoader();
    },
    function(err) {
      setText('name', 'Erreur : ' + err.message);
      hideLoader();
    }
  );

  db.collection('services').where('sellerId', '==', sellerId)
    .onSnapshot(
      function(snap) {
        setText('cntSrv', snap.size);

        if (!snap.empty) {
          var loc = snap.docs[0].data().location;
          if (loc && loc.city) {
            setText('city', loc.city);
            var metaEl = $id('meta');
            if (metaEl) {
              metaEl.innerHTML = '<div class="mchip"><i class="fa-solid fa-location-dot"></i><strong>' + loc.city + '</strong></div>';
            }
          }
        }

        var zone = $id('srvZone');
        if (snap.empty) {
          zone.innerHTML = '<div class="empty"><i class="fa-solid fa-briefcase"></i><p>Aucun service publié.</p></div>';
          return;
        }

        var html = '';
        snap.docs.forEach(function(doc) {
          var s = doc.data();
          var title = (s.title || 'Service').replace(/</g, '&lt;');
          var desc = (s.description || '').trim();
          var descShort = desc.length > 130 ? desc.substring(0, 130) + '…' : desc;
          var price = (s.price != null) ? s.price : 0;
          var unit = s.unit || '';
          var priceStr = (window.__needs_prefs && window.__needs_prefs.formatPriceCad)
            ? window.__needs_prefs.formatPriceCad(price)
            : ('CA$ ' + price);
          var img = (s.imageUrl && s.imageUrl.trim() !== '')
            ? s.imageUrl
            : 'https://placehold.co/400x300/0f172a/2563EB?text=' + encodeURIComponent(s.title || 'Service');

          html += '<div class="sc">'
            + '<img src="' + img + '" alt="' + title + '" onerror="this.src=\'https://placehold.co/400x300/0f172a/2563EB?text=IMG\';this.onerror=null;">'
            + '<div class="sbody">'
            + '<h3>' + title + '</h3>'
            + (descShort ? '<p>' + descShort.replace(/</g, '&lt;') + '</p>' : '')
            + '<div class="sprice">' + priceStr + ' <small>/ ' + unit + '</small></div>'
            + '<a href="services.html?service=' + encodeURIComponent(doc.id) + '" class="btnbook"><span class="txt-reserve">Réserver</span> <i class="fa-solid fa-arrow-right"></i></a>'
            + '</div></div>';
        });
        zone.innerHTML = html;
      },
      function(err) {
        $id('srvZone').innerHTML = '<div class="empty"><i class="fa-solid fa-triangle-exclamation"></i><p>Erreur services : ' + err.message + '</p></div>';
      }
    );

  db.collection('reviews').where('sellerId', '==', sellerId)
    .onSnapshot(
      function(snap) {
        setText('cntRev', snap.size);
        var zone = $id('revZone');

        if (snap.empty) {
          zone.innerHTML = '<div class="empty"><i class="fa-solid fa-star"></i><p>Aucun avis pour le moment.</p></div>';
          return;
        }

        var total = 0;
        var revs = [];
        snap.docs.forEach(function(doc) {
          var r = doc.data();
          total += (r.rating || 0);
          revs.push(r);
        });

        var avg = (total / snap.size).toFixed(1);
        setText('cntRat', avg);
        $id('ratingRow').style.display = 'flex';
        setText('ratingAside', avg + ' ★ (' + snap.size + ' avis)');

        revs.sort(function(a, b) {
          var da = a.createdAt && a.createdAt.toDate ? a.createdAt.toDate() : new Date(0);
          var db2 = b.createdAt && b.createdAt.toDate ? b.createdAt.toDate() : new Date(0);
          return db2 - da;
        });

        var html = '';
        revs.forEach(function(r) {
          var stars = '★'.repeat(r.rating || 0) + '☆'.repeat(5 - (r.rating || 0));
          var date = (r.createdAt && r.createdAt.toDate)
            ? r.createdAt.toDate().toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' })
            : '';
          html += '<div class="rc">'
            + '<div class="rstars">' + stars + '</div>'
            + '<div class="rname">' + (r.reviewerName || r.clientName || 'Utilisateur') + '</div>'
            + (r.comment ? '<div class="rtext">' + r.comment.replace(/</g, '&lt;') + '</div>' : '')
            + (date ? '<div class="rdate">' + date + '</div>' : '')
            + '</div>';
        });
        zone.innerHTML = html;
      },
      function(err) {
        console.error('Avis error:', err);
      }
    );

  auth.onAuthStateChanged(function(user) {
    var btn = $id('msgBtn');
    if (!btn) return;
    if (user && user.uid === sellerId) {
      btn.href = 'compte.html';
      btn.innerHTML = '<i class="fa-solid fa-gauge-high"></i> <span class="txt-mydash">Mon Compte</span>';
    } else if (user) {
      btn.href = 'messages.html?to=' + encodeURIComponent(sellerId);
      btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> <span class="txt-msg">Envoyer un message</span>';
    } else {
      btn.href = 'auth.html?redirect=' + encodeURIComponent(window.location.href);
      btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> <span class="txt-msg">Envoyer un message</span>';
    }
  });

  if (window.__needs_prefs) {
    window.__needs_prefs.applyTheme(window.__needs_prefs.getTheme());
    var ti = $id('themeIcon');
    if (ti) {
      if (window.__needs_prefs.getTheme() === 'light') { ti.classList.remove('fa-moon'); ti.classList.add('fa-sun'); }
      else { ti.classList.remove('fa-sun'); ti.classList.add('fa-moon'); }
    }
  }
}

function toggleTheme() {
  var root = document.documentElement;
  var isLight = root.classList.toggle('needs-light');
  document.body.classList.toggle('light-mode', isLight);
  if (isLight) document.body.classList.remove('dark-mode');
  else document.body.classList.add('dark-mode');
  var icon = $id('themeIcon');
  if (icon) {
    icon.classList.toggle('fa-moon', !isLight);
    icon.classList.toggle('fa-sun', isLight);
  }
  if (window.__needs_prefs) window.__needs_prefs.setTheme(isLight ? 'light' : 'dark');
}

document.querySelectorAll('.tbb').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tbb').forEach(function(b) { b.classList.remove('act'); });
    btn.classList.add('act');
    var tab = btn.getAttribute('data-tab');
    $id('srvZone').style.display = tab === 'srv' ? 'block' : 'none';
    $id('revZone').style.display  = tab === 'rev' ? 'block' : 'none';
  });
});
</script>

    <div id="needs-unified-footer"></div>
    <script defer src="js/inject-unified-footer.js"></script>
</body>
</html>
