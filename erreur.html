<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <link rel="canonical" href="https://needs-ae86d.web.app/erreur.html">
    <title>Paiement Annulé — Needs</title>
    <script src="prefs.js"></script>
  <script src="js/theme-init.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/needs-analytics.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="theme-needs.css">
    <style>
        body {
            background: var(--navy-bg);
            color: var(--text);
            font-family: var(--font-alt);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: var(--glass-bg);
            padding: 50px;
            border-radius: 24px;
            border: 1px solid var(--navy-border);
            max-width: 400px;
            box-shadow: var(--shadow-premium);
        }
        .icon {
            font-size: 60px;
            color: var(--danger);
            margin-bottom: 20px;
        }
        h1 { margin-bottom: 10px; font-family: var(--font-display); }
        p { color: var(--text-dim); margin-bottom: 30px; }
        .btn {
            border: 1px solid var(--accent);
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: bold;
            display: inline-block;
            transition: background 0.2s, border-color 0.2s;
        }
        .btn:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
        html.needs-light .container,
        body.light-mode .container { border-color: var(--border); }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon"><i class="fa-solid fa-circle-xmark"></i></div>
        <h1>Paiement annulé</h1>
        <p>L'opération a été interrompue. Aucun montant n'a été prélevé sur votre compte.</p>
        <a href="index.html" class="btn">Réessayer</a>
    </div>

    <div id="needs-unified-footer"></div>
    <script defer src="js/inject-unified-footer.js"></script>
</body>
</html>
