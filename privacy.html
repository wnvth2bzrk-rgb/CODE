        .priv-section ul { padding-left: 1.1rem; margin: 0 0 8px; }
        .priv-section a { color: #7dd3fc; }
        html.needs-light body.page-privacy,

        html.needs-light .priv-section p, html.needs-light .priv-section li,

        function renderPrivacy() {
