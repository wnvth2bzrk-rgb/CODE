<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Connectez-vous ou créez un compte Needs : email ou Google. Accès sécurisé à vos réservations et messages.">
    <title>Needs — Connexion / Inscription</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="canonical" href="https://needs-ae86d.web.app/auth.html">
    <script src="prefs.js"></script>
  <script src="js/theme-init.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/needs-analytics.js"></script>
    <link rel="icon" type="image/png" href="favicon.png?v=1.1">
    <link rel="stylesheet" href="theme-needs.css">
    <link rel="stylesheet" href="cursor.css">
    <link rel="stylesheet" href="mobile-app-shell.css">
    <style>
        body { 
            background: var(--navy-bg); 
            color: var(--text); 
            font-family: var(--font-alt); 
            display: flex; 
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center;
            min-height: 100vh; 
            margin: 0; 
            padding: 24px 16px;
            box-sizing: border-box;
        }

        .auth-card { 
            background: var(--navy-card); 
            padding: 40px; 
            border-radius: 20px; 
            border: 1px solid var(--navy-border); 
            width: 100%; 
            max-width: 420px; 
            text-align: center; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        h2 { margin-bottom: 20px; font-weight: 600; color: var(--text); font-family: var(--font-display); }

        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            background: var(--navy-bg); 
            border: 1px solid var(--navy-border); 
            color: var(--text); 
            border-radius: 10px; 
            box-sizing: border-box; 
            outline: none;
            max-width: 100%;
            transition: border-color 0.3s;
        }
        input::placeholder { color: rgba(255,255,255,0.6); }
        input:focus { border-color: var(--accent); }

        .btn { 
            width: 100%; 
            padding: 12px; 
            background: var(--accent); 
            border: none; 
            color: #ffffff !important; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 12px; 
            transition: background 0.3s;
        }
        .btn:hover { background: var(--accent-hover); color: #ffffff !important; }
        .btn:disabled { background: var(--navy-light); cursor: not-allowed; color: #ffffff !important; }

        .btn-google {
            background: #ffffff;
            color: #3c4043 !important;
            border: 1px solid #dadce0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            font-weight: 500;
            box-shadow: 0 1px 2px rgba(0,0,0,0.06);
        }
        .btn-google:hover { background: #f8f9fa; border-color: #dadce0; color: #3c4043 !important; }

        .mode-switch {
            display: flex;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--navy-border);
            margin-bottom: 20px;
        }
        .mode-switch button {
            flex: 1;
            padding: 12px 8px;
            border: none;
            background: transparent;
            color: var(--text);
            font-weight: 700;
            cursor: pointer;
            font-size: 14px;
        }
        .mode-switch button.active {
            background: rgba(201, 168, 76, 0.2);
            color: var(--accent);
        }

        .btn-toggle { 
            background: none; 
            border: none; 
            color: var(--text); 
            cursor: pointer; 
            font-size: 14px; 
            margin-top: 16px; 
            text-decoration: underline; 
            display: block;
            width: 100%;
            opacity: 0.9;
        }
        .btn-toggle:hover { color: #ffffff; opacity: 1; }

        .resend-link {
            display: none;
            margin-top: 15px;
            font-size: 13px;
            color: #fbbf24;
            cursor: pointer;
            text-decoration: underline;
        }

        .back-link {
            display: inline-block;
            margin-top: 22px;
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            transition: opacity 0.3s;
            opacity: 0.9;
        }
        .back-link:hover { color: #ffffff; opacity: 1; }

        .reassurance-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 22px;
            font-size: 12px;
            color: rgba(255,255,255,0.85);
        }
        .reassurance-badges span {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 12px;
            border-radius: 999px;
        }

        html.needs-light body,
        body.light-mode { background: #faf8f5 !important; color: #1c1917 !important; }
        html.needs-light .auth-card,
        body.light-mode .auth-card { background: #ffffff !important; border-color: #e5d9cc !important; box-shadow: var(--shadow-premium); }
        html.needs-light h2,
        body.light-mode h2 { color: #1c1917 !important; }
        html.needs-light input,
        body.light-mode input { background: #faf8f5 !important; color: #1c1917 !important; border-color: #e5d9cc !important; }
        html.needs-light input::placeholder,
        body.light-mode input::placeholder { color: #9ca3af !important; }
        html.needs-light .btn-google,
        body.light-mode .btn-google { background: #ffffff !important; color: #3c4043 !important; border-color: #dadce0 !important; }
        html.needs-light .btn:not(.btn-google),
        body.light-mode .btn:not(.btn-google) { background: #1d4ed8 !important; color: #ffffff !important; }
        html.needs-light .btn:disabled,
        body.light-mode .btn:disabled { background: #e5e7eb !important; color: #6b7280 !important; }
        html.needs-light .btn-toggle,
        body.light-mode .btn-toggle { color: #1c1917 !important; }
        html.needs-light .btn-toggle:hover,
        body.light-mode .btn-toggle:hover { color: #57534e !important; }
        html.needs-light .resend-link,
        body.light-mode .resend-link { color: #b45309 !important; }
        html.needs-light .back-link,
        body.light-mode .back-link { color: #1c1917 !important; }
        html.needs-light .back-link:hover,
        body.light-mode .back-link:hover { color: #57534e !important; }
        html.needs-light .reassurance-badges span,
        body.light-mode .reassurance-badges span { background: #f4f4f5; border-color: #e4e4e7; color: #52525b; }
        .auth-info-banner {
            display: none;
            margin-top: 16px;
            font-size: 14px;
            color: rgba(26, 21, 16, 0.95);
            padding: 12px 14px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(201, 168, 76, 0.35), rgba(201, 168, 76, 0.18));
            border: 1px solid rgba(201, 168, 76, 0.55);
            text-align: left;
            line-height: 1.45;
        }
        html.needs-light .auth-info-banner,
        body.light-mode .auth-info-banner { color: #422006; border-color: rgba(180, 83, 9, 0.35); }
        .auth-legal { margin-top: 18px; font-size: 12px; line-height: 1.55; color: rgba(255, 255, 255, 0.78); text-align: center; }
        html.needs-light .auth-legal,
        body.light-mode .auth-legal { color: #57534e; }
        .needs-footer-minimal {
            width: 100%;
            max-width: 420px;
            margin-top: auto;
            padding: 18px 8px 8px;
            background: transparent;
            color: #9B99A6;
            text-align: center;
            font-size: 0.78rem;
            line-height: 1.6;
        }
        .needs-footer-minimal a { color: #C9A84C; text-decoration: none; font-weight: 600; }
        .needs-footer-minimal a:hover { text-decoration: underline; }
        .auth-provider-cta {
            margin-top: 16px;
            font-size: 13px;
            line-height: 1.45;
            color: rgba(255, 255, 255, 0.85);
            text-align: center;
        }
        .auth-provider-cta a {
            display: inline-block;
            margin-top: 4px;
            color: var(--accent);
            font-weight: 700;
            text-decoration: none;
        }
        .auth-provider-cta a:hover { text-decoration: underline; }
        html.needs-light .auth-provider-cta,
        body.light-mode .auth-provider-cta { color: #57534e; }
    </style>
</head>
<body data-no-inject-footer="true" data-no-cookie-banner="true">

<div class="auth-card">
    <div class="mode-switch" role="tablist" aria-label="Mode">
        <button type="button" id="tabSignup" class="active" onclick="setAuthMode(false)" data-i18n="auth_title_signup">Créer un compte</button>
        <button type="button" id="tabLogin" onclick="setAuthMode(true)" data-i18n="auth_title_login">Se connecter</button>
    </div>

    <h2 id="authTitle" data-i18n="auth_title_signup">Créer un compte</h2>
    
    <input type="email" id="email" data-i18n-placeholder="auth_email_ph" placeholder="Courriel" autocomplete="email">
    <input type="password" id="password" data-i18n-placeholder="auth_password_ph" placeholder="Mot de passe" autocomplete="current-password">
    
    <button class="btn" id="authBtn" onclick="handleAuth()" data-i18n="auth_btn_signup">S'inscrire</button>

    <button type="button" class="btn btn-google" id="googleBtn" onclick="handleGoogleSignIn()">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
        <span data-i18n="auth_google">Continuer avec Google</span>
    </button>

    <p id="authInfoBanner" class="auth-info-banner" role="status"></p>

    <div class="reassurance-badges">
        <span data-i18n="auth_badge_secure">🔒 Données sécurisées</span>
        <span data-i18n="auth_badge_no_commit">✅ Sans engagement</span>
        <span data-i18n="auth_badge_fast">⚡ Accès immédiat</span>
    </div>

    <p id="authLegalWrap" class="auth-legal" data-i18n-html="auth_legal_html" style="display:none;"></p>
    
    <div id="resendBlock" class="resend-link" onclick="resendEmail()">
        Je n'ai pas reçu l'email ? Renvoyer le lien.
    </div>

    <button class="btn-toggle" onclick="toggleMode()" id="toggleBtn" type="button" data-i18n="auth_switch_to_login">
        Déjà un compte ? Se connecter
    </button>

    <p class="auth-provider-cta">
        <span data-i18n="auth_provider_cta_intro">Vous voulez proposer vos services ?</span><br>
        <a href="become-provider.html#inscription" data-i18n="auth_provider_cta_link">Créez un compte prestataire →</a>
    </p>

    <a href="index.html" class="back-link" data-i18n="auth_back">← Retour à l'accueil</a>
</div>

<footer class="needs-footer-minimal" role="contentinfo" data-i18n-html="footer_minimal_line"></footer>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="js/nav-provider-cta.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-functions.js"></script>
<script src="auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
    if (typeof applyAuthLabels === 'function') applyAuthLabels();
    try {
        var info = new URLSearchParams(window.location.search).get('info');
        var b = document.getElementById('authInfoBanner');
        if (b && info && window.NeedsI18n && typeof NeedsI18n.t === 'function') {
            var msg = '';
            if (info === 'contact_provider') msg = NeedsI18n.t('auth_info_contact_provider');
            else if (info === 'reserve') msg = NeedsI18n.t('auth_info_reserve');
            if (msg) {
                b.style.display = 'block';
                b.textContent = msg;
            }
        }
    } catch (e) {}
    try {
        if (window.NeedsI18n && NeedsI18n.applyDOM) NeedsI18n.applyDOM(NeedsI18n.getLang());
    } catch (e2) {}
});
</script>
<script src="cursor.js" defer></script>
</body>
</html>
